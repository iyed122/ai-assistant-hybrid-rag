server {
    listen 80;
    server_name _;

    # ── Serve React SPA ────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── /chat/stream — SSE streaming endpoint ─────────────────────────────────
    # proxy_buffering MUST be off or the browser never receives tokens.
    # proxy_read_timeout must be long enough for the full generation.
    location /chat {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        chunked_transfer_encoding on;
    }

    # ── /conversations — conversation CRUD ────────────────────────────────────
    location /conversations {
        proxy_pass           http://backend:8000;
        proxy_http_version   1.1;
        proxy_set_header     Host            $host;
        proxy_set_header     X-Real-IP       $remote_addr;
        proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /health — health check ─────────────────────────────────────────────────
    location /health {
        proxy_pass           http://backend:8000;
        proxy_http_version   1.1;
        proxy_set_header     Host $host;
    }

    # ── /training — training pipeline (SSE streaming + REST) ──────────────────
    # /training/run also streams logs via SSE — same buffering rules as /chat.
    location /training {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        chunked_transfer_encoding on;
    }
}
